<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <!-- Anchor -->
  <g transform="translate(96, 96)" fill="none" stroke="#58a6ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical shaft -->
    <line x1="0" y1="-50" x2="0" y2="30"/>
    <!-- Top ring -->
    <circle cx="0" cy="-50" r="10"/>
    <!-- Crossbar -->
    <line x1="-25" y1="-10" x2="25" y2="-10"/>
    <!-- Bottom arc -->
    <path d="M -35 30 Q 0 65 35 30"/>
    <!-- Flukes -->
    <line x1="-35" y1="30" x2="-45" y2="45"/>
